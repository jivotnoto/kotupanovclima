<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
        Options FollowSymLinks
    </Directory>

    ServerSignature Off
    TraceEnable Off

    ErrorLog /var/www/html/storage/logs/apache-error.log
    LogFormat "%a %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-agent}i\" xff=\"%{X-Forwarded-For}i\" xri=\"%{X-Real-IP}i\"" forwarded_combined
    CustomLog /var/www/html/storage/logs/apache-access.log forwarded_combined
</VirtualHost>
